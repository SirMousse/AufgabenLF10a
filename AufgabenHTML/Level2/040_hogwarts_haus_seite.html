Erstelle eine Seite über ein Hogwarts-Haus deiner Wahl.

Die Seite soll folgende Struktur haben: - Header mit Titel
                                        - Navigation mit Links zu:
                                        - Eigenschaften
                                        - berühmte Mitglieder
                                        - Hausgeist

                    - <nav>
                    - <main>
                    - <section>
                    - <footer>
